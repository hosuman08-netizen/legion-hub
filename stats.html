<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Legion 측정 대시보드</title>
<style>
:root{--bg:#0b0a10;--surf:#15131d;--gold:#e0b552;--dim:#8a8398;--txt:#ece8f1;--line:#241f30}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,system-ui,sans-serif;padding:24px;max-width:900px;margin:0 auto}
h1{font-size:24px;color:var(--gold);margin-bottom:4px}
.sub{color:var(--dim);font-size:13px;margin-bottom:20px}
.cfg{background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
input{flex:1;min-width:200px;padding:9px;border-radius:8px;border:1px solid var(--line);background:#0b1020;color:#fff;font-size:13px}
button{padding:9px 16px;border:none;border-radius:8px;background:var(--gold);color:#1a1400;font-weight:700;cursor:pointer}
table{width:100%;border-collapse:collapse;background:var(--surf);border-radius:12px;overflow:hidden}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);font-size:13px}
th{color:var(--gold);font-size:12px}
td.n{text-align:right;font-variant-numeric:tabular-nums}
tr:hover td{background:#1a1622}
.muted{color:var(--dim)}
#status{font-size:12px;color:var(--dim);margin-top:10px}
</style></head><body>
<h1>🏛️ Legion 측정 대시보드</h1>
<p class="sub">19개 앱 view·DAU 집계 · 워커 URL 넣고 새로고침</p>
<div class="cfg">
<input id="url" placeholder="워커 URL (예: https://legion-analytics.xxx.workers.dev)" value="">
<input id="days" type="number" value="7" style="max-width:70px" title="일수">
<button onclick="loadAll()">조회</button>
</div>
<table><thead><tr><th>앱</th><th style="text-align:right">views</th><th style="text-align:right">DAU</th><th style="text-align:right">활성화</th><th style="text-align:right">활성율</th><th style="text-align:right">공유(K)</th></tr></thead>
<tbody id="rows"><tr><td colspan="3" class="muted">워커 URL 입력 후 조회</td></tr></tbody></table>
<div id="status"></div>
<script>
var APPS=["saju-miniapp","tarot-oracle","gochess","daedalus-conquest","my-pantheon","magic-school","glow-forge","p3-companion",
"aether-canvas","errand-go","lumina","lumen-live","coinwallet-sim","tradedesk","memeforge-sim","stablelink",
"land-tiles","ideaforge","buildquote","adforge"];
try{var saved=localStorage.getItem('legion_dash_url'); if(saved)document.getElementById('url').value=saved;}catch(e){}
async function loadAll(){
  var url=document.getElementById('url').value.replace(/\/$/,'');
  var days=document.getElementById('days').value||7;
  if(!url){document.getElementById('status').textContent='워커 URL을 넣어주세요.';return;}
  try{localStorage.setItem('legion_dash_url',url);}catch(e){}
  var rows=document.getElementById('rows'); rows.innerHTML='<tr><td colspan="3" class="muted">조회 중…</td></tr>';
  var out=[];
  for(var i=0;i<APPS.length;i++){
    try{
      var r=await fetch(url+'/stats?app='+APPS[i]+'&days='+days); var d=await r.json();
      var v=0,act=0,sh=0,dau=0; for(var k in (d.daily||{})){v+=d.daily[k].views||0;act+=d.daily[k].activate||0;sh+=d.daily[k].share||0;}
      var keys=Object.keys(d.daily||{}).sort(); if(keys.length)dau=d.daily[keys[keys.length-1]].dau||0;
      out.push({app:APPS[i],v:v,dau:dau,act:act,sh:sh,rate:v?Math.round(act/v*100):0});
    }catch(e){out.push({app:APPS[i],v:'-',dau:'-',act:'-',sh:'-',rate:'-'});}
  }
  out.sort(function(a,b){return (b.v||0)-(a.v||0);});
  rows.innerHTML=out.map(function(o){return '<tr><td>'+o.app+'</td><td class="n">'+o.v+'</td><td class="n">'+o.dau+'</td><td class="n">'+o.act+'</td><td class="n">'+(o.rate==='-'?'-':o.rate+'%')+'</td><td class="n">'+o.sh+'</td></tr>';}).join('');
  document.getElementById('status').textContent='업데이트: '+new Date().toLocaleString();
}
if(document.getElementById('url').value) loadAll();
</script></body></html>
